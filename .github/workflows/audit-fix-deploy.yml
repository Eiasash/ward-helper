name: audit-fix-deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # weekly Sun 06:00 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Bundle size (entry 180 kB gz, all assets 400 kB gz)
        # Entry budget headroom for lazy-loaded route + safety engine. Total
        # assets ceiling prevents lazy chunks from growing unbounded. Cold-
        # start measurement on real device pending.
        run: |
          MAIN=$(find dist/assets -name 'index-*.js' | head -1)
          SIZE=$(gzip -c "$MAIN" | wc -c)
          echo "entry chunk gzipped: $SIZE bytes"
          [ "$SIZE" -le 184320 ] || { echo "FAIL: entry chunk exceeds 180 kB"; exit 1; }
          TOTAL=0
          for f in dist/assets/*.js; do
            S=$(gzip -c "$f" | wc -c)
            TOTAL=$((TOTAL + S))
          done
          echo "total JS gzipped: $TOTAL bytes"
          [ "$TOTAL" -le 409600 ] || { echo "FAIL: total assets exceed 400 kB"; exit 1; }
      - name: CSP + no-analytics greps
        run: |
          grep -q 'Content-Security-Policy' index.html
          ! grep -rEi 'google-analytics|googletagmanager|sentry\.io|posthog|mixpanel' src/ public/ index.html
      - name: Invariant — no plaintext PHI patterns in source
        run: |
          ! grep -rE 'console\.log\(.*(teudatZehut|bodyHebrew)' src/
          ! grep -rE 'localStorage\.setItem\(.*bodyHebrew' src/
      - name: Invariant — PBKDF2 >= 600000
        run: grep -qE 'PBKDF2_ITERATIONS\s*=\s*600_000' src/crypto/pbkdf2.ts
      - name: Invariant — Claude access goes through the Toranot proxy
        run: grep -q 'toranot.netlify.app/api/claude' src/agent/client.ts
      - name: Invariant — Anthropic SDK not in runtime deps
        run: |
          ! grep -q '"@anthropic-ai/sdk"' package.json || { echo "FAIL: SDK should be removed after proxy migration"; exit 1; }
      - name: Invariant — image compression runs before shots are stored
        run: grep -q 'compressImage' src/ui/screens/Capture.tsx
